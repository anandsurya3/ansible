- name: reading
  hosts: local
  connection: local
  vars_prompt:
  - name: username
    prompt: what is your username : 
    private: false
  - name: password
    prompt: what is your password
    private: true
  tasks:
    - name: print the credentails
      ansible.builtin.degub:
        msg: "your username {{username}}, your password : {{password}}"